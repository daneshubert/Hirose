<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HIROSE // MATERIALS LAB</title>
    <style>
        :root { --cyan: #00f2ff; --bg: #0a0c10; --panel: #11141b; }
        body { margin: 0; padding: 0; background: var(--bg); color: #e6edf3; font-family: sans-serif; display: grid; grid-template-rows: 60px 1fr 35px; height: 100vh; overflow: hidden; }
        .header { background: #000; padding: 0 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--cyan); }
        .header img { height: 32px; filter: grayscale(1) brightness(1.5); }
        .main { display: grid; grid-template-columns: 420px 1fr; gap: 20px; padding: 20px; }
        .sidebar { background: var(--panel); border: 1px solid rgba(0,242,255,0.1); border-radius: 4px; display: flex; flex-direction: column; overflow-y: auto; }
        .sidebar-header { padding: 12px; font-size: 11px; background: rgba(0,242,255,0.08); border-bottom: 1px solid rgba(0,242,255,0.1); color: var(--cyan); font-weight: bold; }
        .blueprint-viewport { background-color: #0d1117; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .media-box-large { width: 95%; aspect-ratio: 16 / 9; background: #000; border: 1px solid var(--cyan); box-shadow: 0 0 40px rgba(0, 242, 255, 0.1); }
        .widget-row { height: 62px; border-bottom: 1px solid rgba(255,255,255,0.03); overflow: hidden; }
    </style>
</head>
<body>
    <div class="header">
        <img src="Hirose Logo Stacked.png">
        <div style="color:var(--cyan); font-size:11px; font-weight:800;">● MATERIAL_ANALYSIS // V_15_ULTRA</div>
    </div>
    <div class="main">
        <div class="sidebar">
            <div class="sidebar-header">CRITICAL MINERAL INDICES</div>
            <!-- INDEPENDENT STACKED WIDGETS -->
            <div class="widget-row"><div class="tradingview-widget-container"><script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>{"symbol": "CAPITALCOM:COPPER", "colorTheme": "dark", "isTransparent": true, "locale": "en"}</script></div></div>
            <div class="widget-row"><div class="tradingview-widget-container"><script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>{"symbol": "CAPITALCOM:NICKEL", "colorTheme": "dark", "isTransparent": true, "locale": "en"}</script></div></div>
            <div class="widget-row"><div class="tradingview-widget-container"><script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>{"symbol": "CAPITALCOM:ALUMINIUM", "colorTheme": "dark", "isTransparent": true, "locale": "en"}</script></div></div>
            <div class="widget-row"><div class="tradingview-widget-container"><script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>{"symbol": "AMEX:REMX", "colorTheme": "dark", "isTransparent": true, "locale": "en"}</script></div></div>
        </div>
        <div class="blueprint-viewport">
            <div class="media-box-large"></div>
        </div>
    </div>
    <div style="background:#000;">
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
        {"symbols": [{"proName":"CAPITALCOM:COPPER","title":"COPPER"},{"proName":"AMEX:REMX","title":"RARE EARTH"}], "colorTheme":"dark","isTransparent":true, "locale": "en"}
        </script>
    </div>
</body>
</html>
