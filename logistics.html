<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIROSE GLOBAL LOGISTICS</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #050a14;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: grid;
            grid-template-rows: 80px 1fr 60px; 
        }

        .header {
            background-color: #000;
            padding: 0 40px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 4px solid #5B95F1; 
        }
        .header img { height: 45px; }
        .status-tag { color: #80B341; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; font-size: 14px; }

        .main-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 15px;
            padding: 15px;
            background: #111;
        }

        .left-column { display: flex; flex-direction: column; gap: 10px; }
        
        .clock-card {
            background: #050a14;
            border: 1px solid rgba(91, 149, 241, 0.2);
            padding: 20px;
            border-radius: 4px;
        }
        .city-name { color: #5B95F1; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .time-display { font-size: 32px; font-weight: bold; color: #fff; margin-top: 5px; }

        .map-panel {
            background: #050a14;
            border: 1px solid rgba(91, 149, 241, 0.2);
            border-radius: 4px;
            overflow: hidden;
        }

        iframe { border: none; width: 100%; height: 100%; }
        .footer { background: #000; display: flex; align-items: center; }
    </style>
</head>
<body>

    <div class="header">
        <img src="Hirose Logo Stacked.png" alt="Hirose">
        <div class="status-tag">● LOGISTICS NETWORK: OPTIMAL</div>
    </div>

    <div class="main-grid">
        <div class="left-column">
            <div class="clock-card">
                <div class="city-name">Chicago (HQ)</div>
                <div id="chi" class="time-display">--:-- --</div>
            </div>
            <div class="clock-card">
                <div class="city-name">Tokyo</div>
                <div id="tok" class="time-display">--:-- --</div>
            </div>
            <div class="clock-card">
                <div class="city-name">Amsterdam</div>
                <div id="ams" class="time-display">--:-- --</div>
            </div>
        </div>

        <div class="map-panel">
            <!-- Windy.com Global Visualization -->
            <iframe src="https://embed.windy.com/embed2.html?lat=21.943&lon=117.422&zoom=3&level=surface&overlay=wind&menu=&message=&marker=&calendar=&pressure=&type=map&location=coordinates&detail=&metricWind=mph&metricTemp=%C2%B0F&radarRange=-1" frameborder="0"></iframe>
        </div>
    </div>

    <div class="footer">
        <div class="tradingview-widget-container" style="width: 100%;">
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            {
                "symbols": [
                    { "proName": "OTC:HROEY", "title": "HIROSE AMERICAS" },
                    { "proName": "NYSE:UPS", "title": "UPS" },
                    { "proName": "NYSE:FDX", "title": "FEDEX" },
                    { "proName": "NYSE:MAERSK_A", "title": "MAERSK" }
                ],
                "colorTheme": "dark", "isTransparent": true, "displayMode": "adaptive", "locale": "en"
            }
            </script>
        </div>
    </div>

    <script>
        function updateClocks() {
            const options = { hour: '2-digit', minute: '2-digit', hour12: true };
            document.getElementById('chi').innerText = new Date().toLocaleTimeString('en-US', { ...options, timeZone: 'America/Chicago' });
            document.getElementById('tok').innerText = new Date().toLocaleTimeString('en-US', { ...options, timeZone: 'Asia/Tokyo' });
            document.getElementById('ams').innerText = new Date().toLocaleTimeString('en-US', { ...options, timeZone: 'Europe/Amsterdam' });
        }
        setInterval(updateClocks, 1000); 
        updateClocks();
    </script>
</body>
</html>
