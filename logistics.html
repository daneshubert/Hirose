<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>HIROSE GLOBAL LOGISTICS</title>
    <style>
        body { margin: 0; background: #050a14; color: white; font-family: sans-serif; height: 100vh; display: grid; grid-template-rows: 80px 1fr 60px; }
        .header { background: #000; padding: 0 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #5B95F1; }
        .main { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; padding: 20px; }
        .clock-card { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 8px; text-align: center; border: 1px solid #5B95F1; }
        .time { font-size: 48px; font-weight: bold; margin: 10px 0; color: #80B341; }
        .city { text-transform: uppercase; letter-spacing: 2px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <img src="Hirose Logo Stacked.png" height="50">
        <div style="color:#80B341">● LOGISTICS STATUS: ON-TIME</div>
    </div>
    <div class="main">
        <div class="clock-card"><div class="city">Chicago (HQ)</div><div class="time" id="chi">--:--</div></div>
        <div class="clock-card"><div class="city">Tokyo</div><div class="time" id="tok">--:--</div></div>
        <div class="clock-card"><div class="city">Amsterdam</div><div class="time" id="ams">--:--</div></div>
    </div>
    <div style="background:#000; height:60px;">
        <div class="tradingview-widget-container"><script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
        {"symbols": [{"proName": "NYSE:UPS","title": "UPS"},{"proName": "NYSE:FDX","title": "FedEx"},{"proName": "OTC:HROEY","title": "HIROSE"}],"colorTheme": "dark","isTransparent": true}
        </script></div>
    </div>
    <script>
        function updateClocks() {
            const options = { hour: '2-digit', minute: '2-digit', hour12: true };
            document.getElementById('chi').innerHTML = new Date().toLocaleTimeString('en-US', { ...options, timeZone: 'America/Chicago' });
            document.getElementById('tok').innerHTML = new Date().toLocaleTimeString('en-US', { ...options, timeZone: 'Asia/Tokyo' });
            document.getElementById('ams').innerHTML = new Date().toLocaleTimeString('en-US', { ...options, timeZone: 'Europe/Amsterdam' });
        }
        setInterval(updateClocks, 1000); updateClocks();
    </script>
</body>
</html>
