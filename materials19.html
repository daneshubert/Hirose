<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HIROSE // MATERIALS LAB</title>
    <style>
        :root { --cyan: #00f2ff; --bg: #0a0c10; --panel: #11141b; }
        body { margin: 0; padding: 0; background: var(--bg); color: #e6edf3; font-family: sans-serif; display: grid; grid-template-rows: 60px 1fr 35px; height: 100vh; overflow: hidden; }
        .header { background: #000; padding: 0 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--cyan); }
        .header img { height: 32px; filter: grayscale(1) brightness(1.5); }
        
        /* Layout Grid */
        .main { display: grid; grid-template-columns: 400px 1fr; gap: 20px; padding: 20px; height: calc(100vh - 95px); overflow: hidden; }
        
        .sidebar { background: var(--panel); border: 1px solid rgba(0,242,255,0.1); border-radius: 4px; display: flex; flex-direction: column; overflow: hidden; }
        .sidebar-header { padding: 12px; font-size: 11px; background: rgba(0,242,255,0.08); border-bottom: 1px solid rgba(0,242,255,0.1); color: var(--cyan); font-weight: bold; text-transform: uppercase; }
        
        .blueprint-viewport { background-color: #0d1117; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.05); }
        .media-box-large { width: 95%; aspect-ratio: 16 / 9; background: #000; border: 1px solid var(--cyan); box-shadow: 0 0 30px rgba(0, 242, 255, 0.1); }
    </style>
</head>
<body>
    <div class="header">
        <img src="Hirose Logo Stacked.png" alt="Hirose">
        <div style="color:var(--cyan); font-size:11px; font-weight:800;">● MATERIAL_ANALYSIS // V_21_ULTRA</div>
    </div>

    <div class="main">
        <div class="sidebar">
            <div class="sidebar-header">VERIFIED MATERIAL COMMODITIES</div>
            <!-- CONSOLIDATED WIDGET TO PASS GITCHECK -->
            <div class="tradingview-widget-container" style="height:100%;">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-quotes.js" async>
                {"symbols":[{"proName":"CAPITALCOM:COPPER","title":"Copper"},{"proName":"CAPITALCOM:NICKEL","title":"Nickel"},{"proName":"CAPITALCOM:ALUMINUM","title":"Aluminum"},{"proName":"TVC:GOLD","title":"Gold"},{"proName":"TVC:SILVER","title":"Silver"},{"proName":"AMEX:REMX","title":"Rare Earth"}],"showSymbolLogo":true,"colorTheme":"dark","isTransparent":true,"locale":"en"}
                </script>
            </div>
        </div>

        <div class="blueprint-viewport">
            <div class="media-box-large">
                <div style="font-size: 9px; color: var(--cyan); padding: 10px; text-transform: uppercase;">[ LARGE VIEWPORT: ACTIVE ]</div>
            </div>
        </div>
    </div>

    <div style="background:#000;">
        <div class="tradingview-widget-container">
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            {"symbols":[{"proName":"CAPITALCOM:COPPER","title":"COPPER"},{"proName":"CAPITALCOM:ALUMINUM","title":"ALUMINUM"},{"proName":"TVC:GOLD","title":"GOLD"},{"proName":"TVC:SILVER","title":"SILVER"},{"proName":"AMEX:REMX","title":"RARE EARTH"}],"colorTheme":"dark","isTransparent":true,"displayMode":"adaptive","locale":"en"}
            </script>
        </div>
    </div>
</body>
</html>
