<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HIROSE // MATERIALS LAB</title>
    <style>
        :root { --cyan: #00f2ff; --bg: #0a0c10; }
        body { margin: 0; background: var(--bg); color: #e6edf3; font-family: 'Courier New', monospace; display: grid; grid-template-rows: 60px 1fr 35px; height: 100vh; overflow: hidden; }
        .header { background: #000; padding: 0 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--cyan); }
        .header img { height: 32px; filter: grayscale(1) brightness(1.5); }
        .main { display: grid; grid-template-columns: 420px 1fr; gap: 20px; padding: 20px; }
        .sidebar { background: #11141b; border: 1px solid rgba(0,242,255,0.1); border-radius: 4px; overflow: hidden; }
        .blueprint { background-image: radial-gradient(rgba(0,242,255,0.05) 1px, transparent 1px); background-size: 25px 25px; border: 1px solid #222; position: relative; border-radius: 4px; }
        .media-anchor { position: absolute; bottom: 20px; right: 20px; width: 450px; aspect-ratio: 16 / 9; background: #000; border: 1px solid var(--cyan); }
    </style>
</head>
<body>
    <div class="header"><img src="Hirose Logo Stacked.png"><div style="color:var(--cyan); font-size:11px;">MATERIAL ANALYSIS // SPEC_REV_04</div></div>
    <div class="main">
        <div class="sidebar">
            <div style="padding:12px; font-size:11px; color:var(--cyan); background:rgba(0,242,255,0.08);">CRITICAL MINERALS</div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-quotes.js" async>
            { "symbols": [
                { "proName": "CAPITALCOM:COPPER", "title": "Copper (Cu)" },
                { "proName": "CAPITALCOM:NICKEL", "title": "Nickel (Ni)" },
                { "proName": "CAPITALCOM:ALUMINIUM", "title": "Aluminum (Al)" },
                { "proName": "AMEX:REMX", "title": "Rare Earth" },
                { "proName": "NASDAQ:SIMO", "title": "Silicon" }
            ], "colorTheme": "dark", "isTransparent": true }
            </script>
        </div>
        <div class="blueprint">
            <div class="media-anchor"><div style="font-size:9px; color:var(--cyan); padding:5px;">SCHEMATIC VIEWPORT (16:9)</div></div>
        </div>
    </div>
    <div style="background:#000;"><script src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
    { "symbols": [{"proName":"CAPITALCOM:COPPER","title":"COPPER"},{"proName":"AMEX:REMX","title":"RARE EARTH"}], "colorTheme":"dark","isTransparent":true }
    </script></div>
</body>
</html>
