<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HIROSE // LOGISTICS</title>
    <style>
        body { margin: 0; background: #050a14; color: white; font-family: sans-serif; display: grid; grid-template-rows: 60px 1fr 35px; height: 100vh; overflow: hidden; }
        .header { background: #000; padding: 0 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #5B95F1; }
        .main { display: grid; grid-template-columns: 320px 1fr; gap: 20px; padding: 20px; align-items: center; }
        .clock-card { background: #11141b; border: 1px solid #222; padding: 15px; border-radius: 4px; margin-bottom: 10px; }
        .media-frame { width: 100%; aspect-ratio: 16 / 9; border: 1px solid #5B95F1; background: #000; }
    </style>
</head>
<body>
    <div class="header"><img src="Hirose Logo Stacked.png"><div style="color:#80B341; font-size:11px;">● LOGISTICS NETWORK: OPTIMAL</div></div>
    <div class="main">
        <div class="clocks">
            <div class="clock-card"><div style="color:#5B95F1; font-size:10px;">CHICAGO</div><div id="chi" style="font-size:24px; font-weight:bold;">--:--</div></div>
            <div class="clock-card"><div style="color:#5B95F1; font-size:10px;">TOKYO</div><div id="tok" style="font-size:24px; font-weight:bold;">--:--</div></div>
            <div class="clock-card"><div style="color:#5B95F1; font-size:10px;">AMSTERDAM</div><div id="ams" style="font-size:24px; font-weight:bold;">--:--</div></div>
        </div>
        <div>
            <div style="font-size:10px; color:#5B95F1; margin-bottom:8px;">GLOBAL CONNECTIVITY (16:9)</div>
            <div class="media-frame"></div> <!-- LAYER WINDY OR MAP VIDEO HERE -->
        </div>
    </div>
    <div style="background:#000;"><script src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
    { "symbols": [{"proName":"NYSE:UPS","title":"UPS"},{"proName":"NYSE:FDX","title":"FEDEX"}], "colorTheme":"dark","isTransparent":true }
    </script></div>
    <script>
        function up(){
            const o={hour:'2-digit',minute:'2-digit',hour12:true};
            document.getElementById('chi').innerText=new Date().toLocaleTimeString('en-US',{...o,timeZone:'America/Chicago'});
            document.getElementById('tok').innerText=new Date().toLocaleTimeString('en-US',{...o,timeZone:'Asia/Tokyo'});
            document.getElementById('ams').innerText=new Date().toLocaleTimeString('en-US',{...o,timeZone:'Europe/Amsterdam'});
        }
        setInterval(up,1000); up();
    </script>
</body>
</html>
