<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIROSE ENGINEERING // MATERIALS</title>
    <style>
        body { margin: 0; padding: 0; background-color: #050a14; color: #ffffff; font-family: 'Helvetica Neue', Arial, sans-serif; overflow: hidden; height: 100vh; display: grid; grid-template-rows: 80px 1fr 60px; }
        .header { background-color: #000; padding: 0 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #5B95F1; }
        .header img { height: 50px; }
        .status-tag { color: #5B95F1; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; font-size: 14px; }
        .dashboard { display: grid; grid-template-columns: 1.2fr 1fr; gap: 15px; padding: 15px; background: #111; }
        .panel { background: #050a14; border: 1px solid rgba(91, 149, 241, 0.2); border-radius: 4px; display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { padding: 10px 15px; font-size: 11px; font-weight: bold; color: #5B95F1; text-transform: uppercase; letter-spacing: 1.5px; background: rgba(0,0,0,0.4); border-bottom: 1px solid rgba(91, 149, 241, 0.2); }
        .blank-space { flex-grow: 1; background: transparent; }
        .footer { background: #000; display: flex; align-items: center; }
    </style>
</head>
<body>
    <div class="header">
        <img src="Hirose Logo Stacked.png" alt="Hirose">
        <div class="status-tag">● ENGINEERING DIV: MATERIAL ANALYSIS</div>
    </div>
    <div class="dashboard">
        <div class="panel">
            <div class="panel-header">Component Visualizer (Layer Video Here)</div>
            <div class="blank-space"></div>
        </div>
        <div class="panel">
            <div class="panel-header">Raw Material Spot Prices</div>
            <div class="tradingview-widget-container" style="height:100%;width:100%">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
                {
                    "colorTheme": "dark", "showChart": true, "locale": "en", "width": "100%", "height": "100%", "transparent": true,
                    "symbolsGroups": [
                        { "name": "Plating & Shell Materials", "symbols": [
                            { "name": "COMEX:HG1!", "displayName": "Copper Future" },
                            { "name": "COMEX:GC1!", "displayName": "Gold Spot" },
                            { "name": "NYMEX:AL1!", "displayName": "Aluminum" },
                            { "name": "OTC:HROEY", "displayName": "Hirose (Americas)" }
                        ]}
                    ]
                }
                </script>
            </div>
        </div>
    </div>
    <div class="footer">
        <div class="tradingview-widget-container" style="width: 100%;">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            {
                "symbols": [
                    { "proName": "OTC:HROEY", "title": "HIROSE" },
                    { "proName": "COMEX:HG1!", "title": "COPPER" },
                    { "proName": "NASDAQ:AAPL", "title": "APPLE" },
                    { "proName": "NASDAQ:NVDA", "title": "NVIDIA" }
                ],
                "colorTheme": "dark", "isTransparent": true, "displayMode": "adaptive", "locale": "en"
            }
            </script>
        </div>
    </div>
</body>
</html>
