<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HIROSE // LOGISTICS LAB</title>
<style>
:root { --hirose-amber: #ffb400; --bg: #0a0c10; --panel: #11141b; }
body { margin: 0; padding: 0; background: var(--bg); color: #e6edf3; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
.header { height: 60px; background: #000; padding: 0 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--hirose-amber); flex-shrink: 0; }
.header img { height: 32px; filter: grayscale(1) brightness(1.5); }

/* VERTICAL LOCK: Ensures bottom ticker is never pushed off-screen */
.main { display: grid; grid-template-columns: 420px 1fr; gap: 20px; padding: 20px; flex-grow: 1; overflow: hidden; margin-bottom: 35px; }

.sidebar { background: var(--panel); border: 1px solid rgba(255,180,0,0.1); border-radius: 4px; display: flex; flex-direction: column; overflow-y: auto; padding: 10px; }
.sidebar-header { padding: 5px 0 10px 0; font-size: 11px; color: var(--hirose-amber); font-weight: bold; border-bottom: 1px solid rgba(255,180,0,0.1); margin-bottom: 10px; text-transform: uppercase; }

.blueprint-viewport { background-color: #0d1117; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.05); }
.media-box-large { width: 95%; aspect-ratio: 16 / 9; background: #000; border: 1px solid var(--hirose-amber); box-shadow: 0 0 40px rgba(255, 180, 0, 0.05); }

.widget-row { min-height: 65px; border-bottom: 1px solid rgba(255,255,255,0.05); }

/* PINNED TICKER: Locks to the bottom edge of the browser window */
.ticker-fixed { position: fixed; bottom: 0; left: 0; width: 100%; height: 35px; background: #000; z-index: 999; border-top: 1px solid #222; }
</style>
</head>
<body>
