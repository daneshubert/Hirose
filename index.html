<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HIROSE // COMMAND CENTER</title>
    <style>
        :root { --hirose-blue: #5B95F1; --bg: #0a0c10; --panel: #11141b; }
        body { 
            margin: 0; background: var(--bg); color: #e6edf3; font-family: sans-serif; 
            display: grid; grid-template-rows: 60px 1fr 35px; height: 100vh; overflow: hidden; 
        }
        
        .header { 
            background: #000; padding: 0 30px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--hirose-blue); 
        }
        .header img { height: 32px; }
        
        .main { display: grid; grid-template-columns: 1fr 400px; gap: 20px; padding: 20px; align-items: center; }
        
        /* MODULAR 16:9 MEDIA FRAME */
        .media-frame { width: 100%; aspect-ratio: 16 / 9; border: 1px solid rgba(91,149,241,0.2); background: #000; border-radius: 4px; }
        .label { font-size: 10px; color: var(--hirose-blue); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1.5px; }
        
        /* SIDEBAR: MARKET QUOTES (STRICT LIST) */
        .sidebar { 
            background: var(--panel); height: 100%; border-radius: 4px; border: 1px solid #222; 
            display: flex; flex-direction: column; overflow: hidden; 
        }
        .sidebar-header { padding: 12px; font-size: 11px; background: rgba(0,0,0,0.3); border-bottom: 1px solid #222; color: var(--hirose-blue); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <img src="Hirose Logo Stacked.png">
        <div style="color:#80B341; font-size:11px; font-weight:800;">● SYSTEM STATUS: ACTIVE</div>
    </div>

    <div class="main">
        <div>
            <div class="label">Featured Media Viewport (16:9)</div>
            <div class="media-frame"></div> </div>

        <div class="sidebar">
            <div class="sidebar-header">GLOBAL MARKET INTELLIGENCE</div>
            <div class="tradingview-widget-container" style="height: 100%; width: 100%;">
                <div class="tradingview-widget-container__widget" style="height: calc(100% - 35px); width: 100%;"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-quotes.js" async>
                {
                  "symbols": [
                    { "proName": "OTC:HROEY", "title": "Hirose (ADR)" },
                    { "proName": "CAPITALCOM:COPPER", "title": "Copper Spot" },
                    { "proName": "NASDAQ:NVDA", "title": "NVIDIA" },
                    { "proName": "NASDAQ:AAPL", "title": "Apple" },
                    { "proName": "NASDAQ:TSLA", "title": "Tesla" }
                  ],
                  "showSymbolLogo": true,
                  "colorTheme": "dark",
                  "isTransparent": true,
                  "locale": "en"
                }
                </script>
            </div>
        </div>
    </div>

    <div style="background:#000;">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            {
                "symbols": [
                    { "proName": "OTC:HROEY", "title": "HIROSE" },
                    { "proName": "CAPITALCOM:COPPER", "title": "COPPER" },
                    { "proName": "NASDAQ:NVDA", "title": "NVIDIA" },
                    { "proName": "NASDAQ:AAPL", "title": "APPLE" }
                ],
                "colorTheme": "dark",
                "isTransparent": true,
                "displayMode": "adaptive",
                "locale": "en"
            }
            </script>
        </div>
    </div>

</body>
</html>
