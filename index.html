<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>HIROSE // COMMAND CENTER</title>
    <style>
        body { margin: 0; background: #050a14; color: white; font-family: sans-serif; display: grid; grid-template-rows: 80px 1fr 60px; height: 100vh; overflow: hidden; }
        .header { background: #000; padding: 0 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #5B95F1; }
        .dashboard { display: grid; grid-template-columns: 1.6fr 1fr; gap: 15px; padding: 15px; background: #111; align-items: center; }
        .panel { background: #050a14; border: 1px solid rgba(91,149,241,0.2); border-radius: 4px; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        .panel-header { padding: 10px 15px; font-size: 11px; font-weight: bold; color: #5B95F1; text-transform: uppercase; border-bottom: 1px solid rgba(91,149,241,0.2); }
        .media-box { width: 100%; aspect-ratio: 16 / 9; border: 1px dashed rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="header"><img src="Hirose Logo Stacked.png" height="50"><div style="color:#80B341">● STATUS: ACTIVE</div></div>
    <div class="dashboard">
        <div class="panel">
            <div class="panel-header">Featured Media (16:9)</div>
            <div class="media-box"></div> <!-- LAYER YOUR VIDEO HERE -->
        </div>
        <div class="panel">
            <div class="panel-header">Market Overview</div>
            <iframe src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" style="width:100%;height:100%;"></iframe>
        </div>
    </div>
    <div style="background:#000;"><script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async></script></div>
</body>
</html>
