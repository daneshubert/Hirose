<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HIROSE // MATERIALS LAB</title>
    <style>
        :root { --cyan: #00f2ff; --bg: #0a0c10; }
        body { margin: 0; background: var(--bg); color: #e6edf3; font-family: 'Courier New', monospace; display: grid; grid-template-rows: 60px 1fr 35px; height: 100vh; overflow: hidden; }
        .header { background: #000; padding: 0 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--cyan); }
        .header img { height: 32px; filter: grayscale(1) brightness(1.5); }
        .main { display: grid; grid-template-columns: 1fr 400px; gap: 20px; padding: 20px; }
        /* SMALLER 16:9 TECHNICAL FRAME */
        .media-frame { width: 100%; aspect-ratio: 16 / 9; border: 1px solid var(--cyan); background: #000; margin-top: auto; }
        .sidebar { display: flex; flex-direction: column; height: 100%; }
        .label { font-size: 10px; color: var(--cyan); text-transform: uppercase; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="header"><img src="Hirose Logo Stacked.png"><div style="color:var(--cyan); font-size:11px;">SPEC-01 // COMMODITY ANALYSIS</div></div>
    <div class="main">
        <div style="background: radial-gradient(rgba(0,242,255,0.05) 1px, transparent 1px); background-size: 25px 25px; border:1px solid #222;">
            <!-- Main Content Area -->
            <iframe src="https://s3.tradingview.com/external-embedding/embed-widget-market-quotes.js" style="width:100%; height:100%; border:none;"></iframe>
        </div>
        <div class="sidebar">
            <div class="label">Material Schematic View</div>
            <div class="media-frame"></div> <!-- SNAP VIDEO HERE -->
            <div style="margin-top:20px; font-size:12px; color:#555;">[ LOG: SENSOR_ARRAY_ACTIVE ]</div>
        </div>
    </div>
    <div style="background:#000;"><script src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async></script></div>
</body>
</html>
