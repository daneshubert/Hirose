<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIROSE // MATERIALS LAB</title>
    <style>
        :root {
            --cyan-tech: #00f2ff;
            --bg-dark: #0a0c10;
            --panel-bg: #11141b;
            --text-dim: #7d8590;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: #e6edf3;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            display: grid;
            grid-template-rows: 60px 1fr 35px; /* Broadcast-safe scaling */
        }

        /* Lean Header */
        .header {
            background-color: #000;
            padding: 0 30px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--cyan-tech);
        }
        .header img { height: 32px; filter: grayscale(1) brightness(1.5); }
        .spec-label { font-size: 11px; color: var(--cyan-tech); letter-spacing: 2px; }

        .main-layout {
            display: grid;
            grid-template-columns: 420px 1fr; /* Fixed sidebar for materials */
            gap: 20px;
            padding: 20px;
        }

        /* Material List (No Generic Tabs) */
        .materials-sidebar {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 242, 255, 0.1);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .section-header {
            background: rgba(0, 242, 255, 0.08);
            padding: 12px 20px;
            font-size: 11px;
            color: var(--cyan-tech);
            border-bottom: 1px solid rgba(0, 242, 255, 0.1);
            text-transform: uppercase;
        }

        /* Right Column: Blueprint Grid + Modular Media Frame */
        .display-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .blueprint-zone {
            flex-grow: 1;
            background-image: radial-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 25px 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* MODULAR 16:9 FRAME (Bottom Right Corner) */
        .media-anchor {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 400px; /* Modular size, not full-screen */
            aspect-ratio: 16 / 9;
            background: #000;
            border: 1px solid var(--cyan-tech);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .media-label { font-size: 9px; color: var(--cyan-tech); position: absolute; top: -15px; left: 0; text-transform: uppercase; }

        .footer { background: #000; display: flex; align-items: center; border-top: 1px solid #222; }
    </style>
</head>
<body>

    <div class="header">
        <img src="Hirose Logo Stacked.png" alt="Hirose">
        <div class="spec-label">COMMODITY ANALYSIS // SPEC_REV_04</div>
    </div>

    <div class="main-layout">
        <!-- LEFT: PURIFIED MATERIALS DATA -->
        <div class="materials-sidebar">
            <div class="section-header">Critical Engineering Minerals</div>
            <div class="tradingview-widget-container" style="height:100%;">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-quotes.js" async>
                {
                  "symbols": [
                    { "proName": "CAPITALCOM:COPPER", "title": "Copper (Cu)" },
                    { "proName": "CAPITALCOM:NICKEL", "title": "Nickel (Ni)" },
                    { "proName": "CAPITALCOM:ALUMINIUM", "title": "Aluminum (Al)" },
                    { "proName": "AMEX:REMX", "title": "Rare Earth (ETF)" },
                    { "proName": "NASDAQ:SIMO", "title": "Silicon (Proxy)" }
                  ],
                  "showSymbolLogo": false,
                  "colorTheme": "dark",
                  "isTransparent": true,
                  "locale": "en"
                }
                </script>
            </div>
        </div>

        <!-- RIGHT: BLUEPRINT ZONE WITH SMALL MODULAR MEDIA FRAME -->
        <div class="display-column">
            <div class="blueprint-zone">
                <div style="color: rgba(0, 242, 255, 0.1); font-size: 11px;">[ SCHEMATIC VIEWPORT ACTIVE ]</div>
                
                <div class="media-anchor">
                    <div class="media-label">Featured Media (16:9)</div>
                    <!-- SNAP YOUR ONSIGNAGE VIDEO HERE -->
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="tradingview-widget-container" style="width: 100%;">
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            {
                "symbols": [
                    { "proName": "CAPITALCOM:COPPER", "title": "COPPER" },
                    { "proName": "CAPITALCOM:NICKEL", "title": "NICKEL" },
                    { "proName": "AMEX:REMX", "title": "RARE EARTH" },
                    { "proName": "CAPITALCOM:ALUMINIUM", "title": "ALUMINUM" },
                    { "proName": "NASDAQ:SIMO", "title": "SILICON" }
                ],
                "colorTheme": "dark",
                "isTransparent": true,
                "displayMode": "adaptive",
                "locale": "en"
            }
            </script>
        </div>
    </div>

</body>
