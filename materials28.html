<!DOCTYPE html>

<style>
:root { --cyan: #00f2ff; --bg: #0a0c10; --panel: #11141b; }
body { margin: 0; padding: 0; background: var(--bg); color: #e6edf3; font-family: sans-serif; height: 100vh; overflow: hidden; }
.header { height: 60px; background: #000; padding: 0 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--cyan); position: relative; z-index: 10; }
.header img { height: 32px; filter: grayscale(1) brightness(1.5); }
.main { display: grid; grid-template-columns: 420px 1fr; gap: 20px; padding: 20px; height: calc(100vh - 110px); }
.sidebar { background: var(--panel); border: 1px solid rgba(0,242,255,0.1); border-radius: 4px; display: flex; flex-direction: column; overflow-y: auto; padding: 10px; }
.sidebar-header { padding: 5px 0 10px 0; font-size: 11px; color: var(--cyan); font-weight: bold; border-bottom: 1px solid rgba(0,242,255,0.1); margin-bottom: 10px; text-transform: uppercase; }
.blueprint-viewport { background-color: #0d1117; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.05); }
.media-box-large { width: 95%; aspect-ratio: 16 / 9; background: #000; border: 1px solid var(--cyan); box-shadow: 0 0 40px rgba(0, 242, 255, 0.1); }
.widget-row { min-height: 62px; border-bottom: 1px solid rgba(255,255,255,0.03); margin-bottom: 2px; }

/* NUCLEAR OPTION: PINNED TICKER */
.ticker-pin { position: absolute; bottom: 0; left: 0; width: 100%; height: 35px; background: #000; z-index: 999; border-top: 1px solid #222; }
</style>
</head>
